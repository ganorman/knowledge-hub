<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plantilla — Landing de una columna</title>
  <style>
    :root { --a:#4f6df5; }
    * { box-sizing:border-box; margin:0; }
    body { font-family:system-ui,-apple-system,"Segoe UI",sans-serif; color:#1f2430; line-height:1.6; }
    .hero { max-width:680px; margin:0 auto; padding:90px 24px 40px; text-align:center; }
    .hero h1 { font-size:42px; letter-spacing:-1px; }
    .hero p { font-size:18px; color:#5b6472; margin:16px 0 28px; }
    .btn { display:inline-block; background:var(--a); color:#fff; padding:14px 28px;
           border-radius:12px; font-weight:600; text-decoration:none; }
    .features { max-width:680px; margin:0 auto; padding:20px 24px 80px;
                display:grid; gap:20px; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); }
    .card { border:1px solid #e4e7ec; border-radius:14px; padding:20px; }
    .card h3 { font-size:17px; margin-bottom:6px; }
    .card p { color:#5b6472; font-size:14px; }
  </style>
</head>
<body>
  <section class="hero">
    <h1>Tu titular aquí</h1>
    <p>Un subtítulo claro que explica el valor en una sola frase. Edita este archivo y reutilízalo.</p>
    <a class="btn" href="#">Llamada a la acción</a>
  </section>
  <section class="features">
    <div class="card"><h3>⚡ Rápido</h3><p>HTML puro, carga instantánea.</p></div>
    <div class="card"><h3>🎨 Personalizable</h3><p>Cambia colores y textos en minutos.</p></div>
    <div class="card"><h3>📱 Responsive</h3><p>Se adapta a cualquier pantalla.</p></div>
  </section>
</body>
</html>
