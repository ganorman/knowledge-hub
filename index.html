<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hub Personal de Conocimiento — portal estático de prompts, ideas, biblioteca, proyectos, finanzas y aprendizaje." />
  <title>Hub Personal de Conocimiento</title>

  <!-- Favicon en emoji (SVG inline, sin archivos externos) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>" />

  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <!-- ===== Barra superior ===== -->
  <header class="topbar">
    <button class="icon-btn menu-toggle" id="menuToggle" aria-label="Abrir menú">☰</button>

    <a href="#/" class="brand" aria-label="Inicio">
      <span class="brand-logo">🧠</span>
      <span class="brand-name">Knowledge Hub</span>
    </a>

    <div class="search-wrap">
      <span class="search-ico" aria-hidden="true">🔍</span>
      <input
        type="search"
        id="globalSearch"
        class="search-input"
        placeholder="Buscar títulos, etiquetas, descripciones…"
        autocomplete="off"
        aria-label="Buscador global"
      />
      <kbd class="search-kbd">/</kbd>
    </div>

    <button class="icon-btn" id="themeToggle" aria-label="Cambiar tema">🌙</button>
  </header>

  <div class="layout">
    <!-- ===== Navegación lateral ===== -->
    <aside class="sidebar" id="sidebar">
      <nav class="nav" id="sideNav" aria-label="Navegación principal"></nav>
      <div class="sidebar-foot">
        <p>Hub estático · 100% local</p>
      </div>
    </aside>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- ===== Contenido ===== -->
    <main class="content" id="app" tabindex="-1">
      <!-- Renderizado por JavaScript -->
    </main>
  </div>

  <!-- Datos primero (define window.HUB), luego la app -->
  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
